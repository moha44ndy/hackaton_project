version: '3.8'

services:
  # Elasticsearch - Moteur de recherche centralisé
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.5.0
    container_name: wmdp-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - "ELASTIC_PASSWORD=changeme"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: curl -s http://localhost:9200 >/dev/null || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - wmdp-network

  # Kibana - Dashboard et visualisation
  kibana:
    image: docker.elastic.co/kibana/kibana:8.5.0
    container_name: wmdp-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      # Kibana connects to Elasticsearch without explicit user when security is disabled
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - wmdp-network

  # PostgreSQL - Annotations
  postgres:
    image: postgres:15-alpine
    container_name: wmdp-postgres
    environment:
      POSTGRES_DB: wmdp_annotations
      POSTGRES_USER: wmdp_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_wmdp_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wmdp_user -d wmdp_annotations"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wmdp-network

  # Redis - Cache (optionnel)
  redis:
    image: redis:7-alpine
    container_name: wmdp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - wmdp-network

volumes:
  elasticsearch_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  wmdp-network:
    driver: bridge
